# CI build-test matrix for LiME kernel module
#
# Strategy: Build LiME against a wide range of kernel versions to catch API
# breakage early. Each version in the matrix is chosen to exercise a specific
# LINUX_VERSION_CODE boundary in the source, plus all active LTS kernels for
# real-world coverage.
#
# How it works:
#   1. Download kernel source tarball from cdn.kernel.org (cached)
#   2. Configure with defconfig + optional config tweaks
#   3. `make modules_prepare` (fast — sets up headers/scripts without full build)
#   4. Build LiME as an out-of-tree module
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ Complete version boundary map (from source #if directives)             │
# │                                                                        │
# │ Cross-referenced against kernel changelogs for all APIs LiME uses:     │
# │   filp_open, filp_close, kernel_write, kernel_accept, kernel_listen,   │
# │   kernel_sendmsg, kernel_sock_shutdown, sock_release, crypto_ahash,    │
# │   kmap_atomic, pfn_to_page, iomem_resource, copy_page, vmalloc_to_    │
# │   page, virt_addr_valid, sg_init_one, module_param, printk, zlib.      │
# │ All verified stable except where version checks already exist.         │
# ├──────────┬────────┬────────────────────────────────────────────────────┤
# │ Version  │ Op     │ What changes                                      │
# ├──────────┼────────┼────────────────────────────────────────────────────┤
# │ 2.6.5  † │ >      │ sock_create → sock_create_kern (tcp.c)            │
# │ 2.6.11 † │ >=     │ Crypto support begins: crypto_tfm API (hash.c)    │
# │ 2.6.18 † │ >=     │ __PTRDIFF_TYPE__ → resource_size_t (main.c)       │
# │ 2.6.19 † │ >=     │ crypto_tfm → crypto_hash API (hash.c)             │
# │ 2.6.35 † │ >=     │ LIME_SUPPORTS_TIMING: ktime functions (lime.h)    │
# │ 2.6.37 † │ >=     │ LIME_USE_KMAP_ATOMIC: kmap_atomic (lime.h)        │
# │ 4.2.0    │ >=     │ sock_create_kern gains &init_net param (tcp.c)     │
# │ 4.6.0    │ >=     │ crypto_hash → crypto_ahash API (hash.c)            │
# │ 4.14.0   │ <      │ vfs_write+set_fs → kernel_write (disk.c)          │
# │          │        │   set_fs removed: x86 in 5.10, all archs by 5.18  │
# │ 5.8.0    │ <      │ kernel_setsockopt → sock_set_reuseaddr (tcp.c)    │
# │          │        │   kernel_setsockopt fully removed in 5.9           │
# │ 6.19.0   │ <      │ sockaddr* → sockaddr_unsized* (tcp.c)             │
# └──────────┴────────┴────────────────────────────────────────────────────┘
# † = 2.6.x boundaries cannot be tested in CI (modern GCC can't build
#     those kernel trees). All 2.6.x code paths have been stable for years.
#
# Non-version-gated kernel changes affecting LiME (no #if needed):
#   5.11  — kmap_atomic() deprecated; kmap_local_page() introduced.
#           Still compiles via compat wrapper. Migration recommended.
#   5.15  — printk() became a macro wrapping _printk(). Transparent.
#   5.18  — IBT (Indirect Branch Tracking) on x86. Breaks modules using
#           init_module()/cleanup_module() magic names (fixed by PR #127).
#   6.2   — __GFP_ATOMIC removed; GFP_ATOMIC macro redefined. Transparent.
#   6.4   — crypto_completion_t callback changed to void*. LiME passes
#           NULL so unaffected.
#   6.15  — init_module()/cleanup_module() formally deprecated with hard
#           build error via objtool. LiME already uses module_init/exit.
#
# Kernel config dependencies:
#   Explicit:  CONFIG_ZLIB_DEFLATE (gates LIME_SUPPORTS_DEFLATE / deflate.c)
#   Implicit:  CONFIG_NET, CONFIG_INET (lime.h includes net/sock.h, net/tcp.h)
#              CONFIG_CRYPTO (hash.c uses crypto APIs for kernels >= 2.6.11)
#              CONFIG_HIGHMEM (lime.h includes linux/highmem.h)
#              CONFIG_MODULES (it's a loadable module)
#
# Known functional gaps (not testable in CI):
#   - iomem_resource traversal only walks first-level children. Since 5.12,
#     virtio-mem/dax/kmem can nest System RAM deeper in the resource tree.
#   - kmap_atomic() should be migrated to kmap_local_page() for >= 5.11.
#     Would also eliminate the manual preempt_enable/disable workaround.

name: Build Test

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly Monday 6am UTC — catches breakage from new kernel releases
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        kernel:
          # ── Version boundary tests ──────────────────────────────────
          # Each pair tests one side of a #if boundary.

          # Before sock_create_kern(&init_net, ...) [added in 4.2]
          # Also covers: crypto_hash API (>= 2.6.19, < 4.6)
          #              set_fs/vfs_write path (< 4.14)
          #              resource_size_t (>= 2.6.18)
          #              kmap_atomic (>= 2.6.37)
          #              timing support (>= 2.6.35)
          - { version: "4.1.1",  major: "4" }

          # After sock_create_kern change; before crypto_ahash [4.6]
          # Tests the crypto_hash path one more time
          - { version: "4.5.1",  major: "4" }

          # First kernel with crypto_ahash API (>= 4.6)
          # Still uses vfs_write+set_fs (< 4.14)
          - { version: "4.6.1",  major: "4" }

          # Last kernel before kernel_write() [4.14]
          # Last to use vfs_write + set_fs + mm_segment_t
          - { version: "4.13.1", major: "4" }

          # First kernel with kernel_write() (>= 4.14)
          - { version: "4.14.1", major: "4" }

          # Last kernel before sock_set_reuseaddr() [5.8]
          # Still uses kernel_setsockopt()
          - { version: "5.7.1",  major: "5" }

          # First kernel with sock_set_reuseaddr (>= 5.8)
          - { version: "5.8.1",  major: "5" }

          # ── LTS kernel coverage (real-world distro kernels) ─────────
          - { version: "4.4.1",   major: "4" }
          - { version: "4.9.1",   major: "4" }
          - { version: "4.19.1",  major: "4" }
          - { version: "5.4.1",   major: "5" }
          - { version: "5.10.1",  major: "5" }
          - { version: "5.15.1",  major: "5" }
          - { version: "6.1.1",   major: "6" }
          - { version: "6.6.1",   major: "6" }
          - { version: "6.12.1",  major: "6" }

          # ── Recent kernels with non-version-gated changes ───────────
          # 6.15: hard build error for init_module() magic name (PR #127)
          # 6.19: kernel_bind() sockaddr_unsized change (PR #136)
          - { version: "6.15.1",  major: "6" }

        config_variant: [default, no-zlib]

        # Test config variants only on boundary versions to limit job count.
        # LTS versions and recent kernels get only default config.
        exclude:
          - kernel: { version: "4.4.1",   major: "4" }
            config_variant: no-zlib
          - kernel: { version: "4.9.1",   major: "4" }
            config_variant: no-zlib
          - kernel: { version: "4.19.1",  major: "4" }
            config_variant: no-zlib
          - kernel: { version: "5.4.1",   major: "5" }
            config_variant: no-zlib
          - kernel: { version: "5.10.1",  major: "5" }
            config_variant: no-zlib
          - kernel: { version: "5.15.1",  major: "5" }
            config_variant: no-zlib
          - kernel: { version: "6.1.1",   major: "6" }
            config_variant: no-zlib
          - kernel: { version: "6.6.1",   major: "6" }
            config_variant: no-zlib
          - kernel: { version: "6.12.1",  major: "6" }
            config_variant: no-zlib
          - kernel: { version: "6.15.1",  major: "6" }
            config_variant: no-zlib

    name: "${{ matrix.kernel.version }} (${{ matrix.config_variant }})"

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential bc flex bison \
            libelf-dev libssl-dev

      - name: Cache prepared kernel tree
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: ~/kernel-${{ matrix.kernel.version }}-${{ matrix.config_variant }}
          key: kernel-${{ matrix.kernel.version }}-${{ matrix.config_variant }}-v1

      - name: Download kernel source
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          url="https://cdn.kernel.org/pub/linux/kernel/v${{ matrix.kernel.major }}.x/linux-${{ matrix.kernel.version }}.tar.xz"
          echo "Downloading $url"
          wget -q "$url" -O linux.tar.xz
          mkdir -p ~/kernel-${{ matrix.kernel.version }}-${{ matrix.config_variant }}
          tar xf linux.tar.xz --strip-components=1 \
            -C ~/kernel-${{ matrix.kernel.version }}-${{ matrix.config_variant }}
          rm linux.tar.xz

      - name: Prepare kernel build tree
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        working-directory: ~/kernel-${{ matrix.kernel.version }}-${{ matrix.config_variant }}
        run: |
          # Start with defconfig for a reasonable baseline.
          # defconfig enables CONFIG_NET, CONFIG_INET, CONFIG_CRYPTO,
          # CONFIG_MODULES, CONFIG_HIGHMEM (on x86), and CONFIG_ZLIB_DEFLATE.
          make defconfig

          # Apply config variant
          case "${{ matrix.config_variant }}" in
            no-zlib)
              ./scripts/config --disable CONFIG_ZLIB_DEFLATE
              make olddefconfig
              ;;
          esac

          # Prepare headers and scripts for out-of-tree module builds.
          # This is much faster than a full kernel build (~30-60s vs ~30min).
          make modules_prepare

      - name: Build LiME module
        working-directory: src
        run: |
          KDIR=~/kernel-${{ matrix.kernel.version }}-${{ matrix.config_variant }}
          echo "Building LiME against kernel ${{ matrix.kernel.version }} (${{ matrix.config_variant }})"
          make -C "$KDIR" M="$(pwd)" modules
          echo "Build successful"
          ls -la lime.ko

      - name: Build LiME module (debug)
        working-directory: src
        run: |
          KDIR=~/kernel-${{ matrix.kernel.version }}-${{ matrix.config_variant }}
          # Clean previous build artifacts
          make -C "$KDIR" M="$(pwd)" clean
          # Build with LIME_DEBUG to verify all DBG() format strings compile
          KCFLAGS="-DLIME_DEBUG" make -C "$KDIR" M="$(pwd)" modules
          echo "Debug build successful"

  # Test against the runner's own kernel headers as a sanity check.
  # This represents the "install headers, build, done" user experience.
  build-runner-kernel:
    runs-on: ubuntu-22.04
    name: "Runner kernel (sanity)"
    steps:
      - uses: actions/checkout@v4
      - name: Install kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq linux-headers-$(uname -r)
      - name: Build LiME
        working-directory: src
        run: |
          make
          echo "Built lime-$(uname -r).ko successfully"
          ls -la lime-*.ko

  # Also test on ubuntu-24.04 to cover newer GCC / stricter compiler defaults.
  # This catches issues like OL9's -Werror=missing-prototypes (issue #134).
  build-runner-kernel-24:
    runs-on: ubuntu-24.04
    name: "Runner kernel (ubuntu-24.04)"
    steps:
      - uses: actions/checkout@v4
      - name: Install kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq linux-headers-$(uname -r)
      - name: Build LiME
        working-directory: src
        run: |
          make
          echo "Built lime-$(uname -r).ko successfully"
          ls -la lime-*.ko

  # Summary job for branch protection rules
  build-status:
    runs-on: ubuntu-latest
    needs: [build, build-runner-kernel, build-runner-kernel-24]
    if: always()
    steps:
      - name: Check build results
        run: |
          if [ "${{ needs.build.result }}" = "failure" ] || \
             [ "${{ needs.build-runner-kernel.result }}" = "failure" ] || \
             [ "${{ needs.build-runner-kernel-24.result }}" = "failure" ]; then
            echo "One or more build jobs failed"
            exit 1
          fi
          echo "All builds passed"
